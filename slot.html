<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>100万倍スロット</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding: 50px; }
        .slot-machine { background: #444; padding: 30px; border-radius: 20px; border: 5px solid #ffd700; display: inline-block; }
        .reels { display: flex; gap: 10px; margin-bottom: 20px; }
        .reel { width: 80px; height: 100px; background: white; color: black; font-size: 50px; line-height: 100px; border-radius: 10px; font-weight: bold; }
        button { font-size: 24px; padding: 10px 40px; background: #ff4500; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px #b22222; }
        button:active { transform: translateY(4px); box-shadow: none; }
        #result { margin-top: 20px; font-size: 1.5em; height: 1.5em; color: #ffd700; }
    </style>
</head>
<body>

<h1>🎰 100万倍スロット 🎰</h1>
<div class="slot-machine">
    <div class="reels">
        <div id="reel1" class="reel">7</div>
        <div id="reel2" class="reel">7</div>
        <div id="reel3" class="reel">7</div>
    </div>
    <button onclick="spin()">SPIN!</button>
    <div id="result"></div>
</div>
<p><a href="index.html" style="color: #aaa;">← メニューに戻る</a></p>

<script>
    const symbols = ["7", "💎", "🍒", "🔔", "🍉", "⭐"];
    let isSpinning = false;

    function spin() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById("result").innerText = "回転中...";

        let spins = 0;
        const interval = setInterval(() => {
            document.getElementById("reel1").innerText = symbols[Math.floor(Math.random() * symbols.length)];
            document.getElementById("reel2").innerText = symbols[Math.floor(Math.random() * symbols.length)];
            document.getElementById("reel3").innerText = symbols[Math.floor(Math.random() * symbols.length)];
            spins++;
            
            if (spins > 10) {
                clearInterval(interval);
                checkResult();
            }
        }, 100);
    }

    function checkResult() {
        const r1 = document.getElementById("reel1").innerText;
        const r2 = document.getElementById("reel2").innerText;
        const r3 = document.getElementById("reel3").innerText;
        const res = document.getElementById("result");

        if (r1 === r2 && r2 === r3) {
            res.innerText = "✨ ジャックポット！おめでとう！ ✨";
        } else {
            res.innerText = "残念！もう一回？";
        }
        isSpinning = false;
    }
</script>

</body>
</html>
