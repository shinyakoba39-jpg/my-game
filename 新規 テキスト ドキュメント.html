<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI数字あてゲーム</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f8ff; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #333; }
        input { font-size: 20px; padding: 10px; width: 100px; border-radius: 10px; border: 2px solid #ddd; }
        button { font-size: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #message { margin-top: 20px; font-weight: bold; font-size: 1.2em; color: #d9534f; }
    </style>
</head>
<body>

<div class="card">
    <h1>AI数字あてゲーム</h1>
    <p>1から100の間でAIが数字を決めたよ！</p>
    <input type="number" id="guess" placeholder="??">
    <button onclick="checkGuess()">予想する</button>
    <div id="message"></div>
</div>

<script>
    // --- ここからがプログラムの本体 ---
    
    // 1. AIが1〜100のランダムな数字を決める
    const targetNumber = Math.floor(Math.random() * 100) + 1;
    let count = 0;

    function checkGuess() {
        const userGuess = document.getElementById("guess").value;
        const messageElement = document.getElementById("message");
        count++;

        // 2. 「もし〜なら」の条件分岐
        if (userGuess == targetNumber) {
            messageElement.style.color = "#28a745";
            messageElement.innerHTML = `正解！🎉 <br>${count}回目で当てたね！`;
        } else if (userGuess > targetNumber) {
            messageElement.innerText = "もっと【小さい】よ！ 👇";
        } else {
            messageElement.innerText = "もっと【大きい】よ！ 👆";
        }
    }
</script>

</body>
</html>
